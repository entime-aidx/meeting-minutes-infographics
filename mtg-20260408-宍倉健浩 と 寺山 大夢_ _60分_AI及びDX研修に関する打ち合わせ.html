<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宍倉健浩 と 寺山 大夢: 【60分】AI及びDX研修に関する打ち合わせ</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reset.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/theme/white.css">
    <style>
        :root {
            --primary: #1a56db;
            --accent: #f59e0b;
            --dark: #1e293b;
        }
        .reveal h1 {
            font-size: 2em;
            color: var(--primary);
            font-weight: 800;
        }
        .reveal h2 {
            font-size: 1.4em;
            color: var(--primary);
            border-bottom: 3px solid var(--accent);
            padding-bottom: 0.3em;
            margin-bottom: 0.6em;
        }
        .reveal ul {
            font-size: 0.85em;
            line-height: 1.8;
            text-align: left;
        }
        .reveal ul li {
            margin-bottom: 0.3em;
        }
        .title-slide .subtitle {
            font-size: 1em;
            color: #64748b;
            margin-top: 1em;
        }
        .title-slide .badge {
            display: inline-block;
            background: var(--accent);
            color: white;
            padding: 0.3em 1em;
            border-radius: 999px;
            font-size: 0.7em;
            margin-top: 1.5em;
            font-weight: 700;
        }
        .action-slide h2 {
            color: #dc2626;
            border-bottom-color: #dc2626;
        }
        .action-slide .action-item {
            background: #fef3c7;
            border-left: 4px solid var(--accent);
            padding: 0.4em 0.8em;
            border-radius: 4px;
            margin-bottom: 0.5em;
            list-style: none;
        }
        .reveal section {
            text-align: left;
        }
        .title-slide {
            text-align: center;
        }
    </style>
</head>
<body>
<div class="reveal">
    <div class="slides">
        
        <section class="title-slide">
            <h1>宍倉健浩 と 寺山 大夢: 【60分】AI及びDX研修に関する打ち合わせ</h1>
            <p class="subtitle">2026-04-08 23:31</p>
            <p class="badge">議事録</p>
        </section>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.js"></script>
<script>
    Reveal.initialize({
        hash: true,
        transition: 'slide',
        controls: true,
        progress: true,
        center: false,
        slideNumber: 'c/t',
    });
</script>
</body>
</html>
